# CI de Nível 04 - Pipeline Inegrada ao Build do Código

# nome da pipeline
name: 'Execução Integrada'

# gatilhos / triggers - regras de disparo
# gatilho manual = workflow_dispatch
# gatilho agendado = schedule
# gatilho por conclusão de oura pipeline = workflow-run

on:
  workflow_dispatch:

#tarefas dentro da pipeline = jobs
jobs:
  #nome do job
  inspecao:
    # maquina onde o job vai rodar
    runs-on: ubuntu-latest

    # passos do job
    steps:
      # clone do projeto
      - uses: actions/checkout@v4

      # instalação do node
      - uses: actions/setup-node@v4
        with:
          node-version: latest

      # instalação do Yarn
      - name: Instalando Yarn
        run: npm install -g yarn

      # instalação das dependências
      - name: Instalando dependências
        run: yarn

      - name: Inspeção de Código
        run: yarn lint

  unidade:
    runs-on: ubuntu-latest
    needs: [inspecao]

    steps:
      # clone do projeto
      - uses: actions/checkout@v4

      # instalação do node
      - uses: actions/setup-node@v4
        with:
          node-version: latest

      # instalação do Yarn
      - name: Instalando Yarn
        run: npm install -g yarn

      # instalação das dependências
      - name: Instalando dependências
        run: yarn

      # Executar os Testes Unitários
      - name: Rodando testes unitários
        run: yarn run test

      # geração de relatorios
      - name: Upload de resultados
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-e2e
          path: ./reports/

  e2e-tests:
    # maquina onde o job vai rodar
    runs-on: ubuntu-latest
    needs: [inspecao]

    # passos do job
    steps:
      # clone do projeto
      - uses: actions/checkout@v4

      # instalação do node
      - uses: actions/setup-node@v4
        with:
          node-version: latest

      # instalação do Yarn
      - name: Instalando Yarn
        run: npm install -g yarn

      # instalação das dependências
      - name: Instalando dependências
        run: yarn

      # execução de testes unitarios - Exercicio 2
      - name: Executando testes unitários
        run: yarn test --coverage

      # instalação dos Browsers do Playwright
      - name: Instalando Browsers do Playwright
        run: yarn playwright install

      # instalação dos Browsers do Playwright
      - name: Instalando Browsers do Playwright
        run: yarn playwright install

      # executar os testes e2e
      - name: Executando testes e2e
        run: yarn run e2e

  deploy:
    runs-on: ubuntu-latest
    needs: [unidade, e2e-tests]

    # passos do job
    steps:
      - name: Simulação de Deploy
        run: echo 'Deploy sendo realizado...'
