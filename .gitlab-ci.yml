stages:
  - e2e

# job principal
e2e-tests:
  stage: e2e
  image: node:24  # usa imagem oficial do Node.js 24.x
  when: manual    # equivale ao workflow_dispatch (execução manual)
  script:
    # clone do projeto já é feito automaticamente pelo GitLab Runner
    #- npm install -g yarn
    # Como o yarn ja esta instalado será executado um comando somente para verificar a versão
    - yarn --version
    - yarn cache clean
    - yarn install --force
    - yarn
    # 1. Instala os navegadores do Playwright E as dependências de sistema do Linux necessárias
    - npx playwright install --with-deps
    # 2. Executa os testes garantindo que variáveis de CI/Headless estejam ativas
    - CI=true yarn run e2e
